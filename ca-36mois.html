<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — CA 36 mois</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — CA 36 mois</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">CA Année 1</div><div class="value" style="color:#185FA5">370 k€</div></div>
<div class="metric"><div class="label">CA Année 2</div><div class="value" style="color:#185FA5">794 k€</div></div>
<div class="metric"><div class="label">CA Année 3</div><div class="value" style="color:#185FA5">1 432 k€</div></div>
<div class="metric"><div class="label">Croissance A1→A3</div><div class="value" style="color:#1D9E75">+287 %</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">Évolution du Chiffre d'Affaires</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

const months = ['Sep 26','Oct','Nov','Déc','Jan 27','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep 27','Oct','Nov','Déc','Jan 28','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep 28','Oct','Nov','Déc','Jan 29','Fév','Mar','Avr','Mai','Jui','Jul','Aoû 29'];
function ramp(tot,n,s,e){const d=[];for(let i=0;i<n;i++){const t=i/(n-1);d.push(Math.round((tot/n)*(s+(e-s)*t)));}const diff=tot-d.reduce((a,b)=>a+b,0);d[d.length-1]+=diff;return d;}
const a1=ramp(370359,12,0.35,1.55),a2=ramp(793561,12,0.65,1.35),a3=ramp(1432081,12,0.70,1.30);
const all=[...a1,...a2,...a3];
const trend=all.map((_,i)=>Math.round(10000+(all[35]-10000)*Math.pow(i/35,2)));
const bgC=[...Array(12).fill('rgba(24,95,165,0.55)'),...Array(12).fill('rgba(24,95,165,0.75)'),...Array(12).fill('rgba(24,95,165,0.95)')];
new Chart(document.getElementById('c'),{type:'bar',data:{labels:months,datasets:[{label:'CA mensuel HT (€)',data:all,backgroundColor:bgC,borderRadius:3,order:2},{label:'Tendance',data:trend,type:'line',borderColor:'#D85A30',borderWidth:2,pointRadius:0,tension:0.4,fill:false,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toLocaleString('fr-FR')+' €'}}},scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>Math.round(v/1000)+'k€'},grid:{color:'rgba(200,200,200,0.3)'}}}}});

</script>
</body>
</html>

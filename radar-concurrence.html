<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — Radar Concurrentiel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — Radar Concurrentiel</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">Note TGDC moy.</div><div class="value" style="color:#185FA5">9,2 / 10</div></div>
<div class="metric"><div class="label">vs Clubs assoc.</div><div class="value" style="color:#D85A30">3,7 / 10</div></div>
<div class="metric"><div class="label">vs Ateliers</div><div class="value" style="color:#AAAAAA">4,2 / 10</div></div>
<div class="metric"><div class="label">Avantage</div><div class="value" style="color:#1D9E75">+148 %</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">Avantages concurrentiels</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

const labs=['Infrastructure','Expertise technique','Expérience membre','Ancrage territorial','Accessibilité tarifaire','Écosystème complet','Communication digitale'];
new Chart(document.getElementById('c'),{type:'radar',data:{labels:labs,datasets:[{label:'TGDC',data:[9.5,9.0,9.5,9.0,9.0,9.5,8.0],borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.18)',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#185FA5'},{label:'Clubs associatifs',data:[2.0,3.0,6.0,6.0,8.5,2.0,2.0],borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,0.08)',borderWidth:1.5,borderDash:[5,4],pointRadius:3},{label:'Ateliers spécialisés',data:[5.0,8.5,2.5,4.0,6.0,2.0,1.5],borderColor:'#AAAAAA',backgroundColor:'rgba(170,170,170,0.06)',borderWidth:1.5,borderDash:[3,3],pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{r:{min:0,max:10,ticks:{stepSize:2,font:{size:9}},pointLabels:{font:{size:11}}}}}});

</script>
</body>
</html>

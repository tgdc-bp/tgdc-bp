<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — Trésorerie mensuelle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — Trésorerie mensuelle</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">Tréso fin A1</div><div class="value" style="color:#1D9E75">+23 k€</div></div>
<div class="metric"><div class="label">Tréso fin A2</div><div class="value" style="color:#1D9E75">+206 k€</div></div>
<div class="metric"><div class="label">Tréso fin A3</div><div class="value" style="color:#1D9E75">+730 k€</div></div>
<div class="metric"><div class="label">Positif dès</div><div class="value" style="color:#C49A3C">Mois 11</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">Évolution de la Trésorerie</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

const months=['Sep 26','Oct','Nov','Déc','Jan 27','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep 27','Oct','Nov','Déc','Jan 28','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep 28','Oct','Nov','Déc','Jan 29','Fév','Mar','Avr','Mai','Jui','Jul','Aoû 29'];
const a1=[9588,13924,-756,-7324,-12780,-18126,-12360,-11482,-7493,-393,9819,23142];
const a2=[35000,55000,75000,95000,112000,128000,142000,154000,164000,178000,193000,206021];
const a3=a2.map((_,i)=>Math.round(206021+(729812-206021)*Math.pow(i/11,1.8)));
const all=[...a1,...a2,...a3];
const bg=all.map(v=>v<0?'rgba(226,75,74,0.3)':'rgba(24,95,165,0.3)');
const bc=all.map(v=>v<0?'#E24B4A':'#185FA5');
new Chart(document.getElementById('c'),{type:'line',data:{labels:months,datasets:[{label:'Trésorerie cumulée (€)',data:all,borderColor:'#185FA5',borderWidth:2.5,pointRadius:3,pointBackgroundColor:bc,backgroundColor:'rgba(24,95,165,0.08)',fill:true,tension:0.3},{label:'Zéro',data:all.map(()=>0),borderColor:'rgba(186,117,23,0.5)',borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'},tooltip:{callbacks:{label:ctx=>{if(ctx.datasetIndex===1)return'';return'Tréso: '+ctx.parsed.y.toLocaleString('fr-FR')+' €';}}}},scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>(v<0?'-':'')+Math.round(Math.abs(v)/1000)+'k€'},grid:{color:'rgba(200,200,200,0.3)'}}}}});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — Funnel Acquisition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — Funnel Acquisition</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">Coût/membre acquis</div><div class="value" style="color:#185FA5">~45 €</div></div>
<div class="metric"><div class="label">LTV 3 ans</div><div class="value" style="color:#1D9E75">12 480 €</div></div>
<div class="metric"><div class="label">ROI acquisition</div><div class="value" style="color:#C49A3C">x 277</div></div>
<div class="metric"><div class="label">Conv. visiteur→mbr</div><div class="value" style="color:#D85A30">40 %</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">Funnel membres Année 1</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

const stages=['Contacts qualifiés','Visiteurs soirées','Membres Passion','Membres Club','Membres Gentleman'];
const vals=[600,150,60,24,6];
const cols=['#1A2B4A','#185FA5','#2A7FCC','#1D9E75','#C49A3C'];
new Chart(document.getElementById('c'),{type:'bar',data:{labels:stages,datasets:[{label:'Nombre',data:vals,backgroundColor:cols,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const rates=[null,'25%','40%','40%','25%'];const r=rates[ctx.dataIndex];return ctx.parsed.x+' personnes'+(r?' — taux conv.: '+r:'');}}}},scales:{x:{ticks:{callback:v=>v},grid:{color:'rgba(200,200,200,0.3)'}},y:{ticks:{font:{size:12}},grid:{display:false}}}}});

</script>
</body>
</html>

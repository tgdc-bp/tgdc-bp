<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — CA par Segment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — CA par Segment</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">Récurrence</div><div class="value" style="color:#185FA5">60 % via cotis.</div></div>
<div class="metric"><div class="label">Marge moyenne</div><div class="value" style="color:#1D9E75">61 %</div></div>
<div class="metric"><div class="label">Segments</div><div class="value" style="color:#1A2B4A">4 résilients</div></div>
<div class="metric"><div class="label">Croissance A1→A3</div><div class="value" style="color:#C49A3C">+287 %</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">CA par segment clientèle</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

new Chart(document.getElementById('c'),{type:'doughnut',data:{labels:['Membres Passion B2C (60%)','Clients Atelier B2C (20%)','Événementiel B2B (10%)','Événementiel Grand Public (10%)'],datasets:[{data:[60,20,10,10],backgroundColor:['#185FA5','#1A2B4A','#C49A3C','#1D9E75'],borderWidth:3,borderColor:'white',hoverOffset:12}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{font:{size:12},padding:14}},tooltip:{callbacks:{label:ctx=>{const ca=Math.round(370359*ctx.parsed/100);return ctx.label+' — ~'+ca.toLocaleString('fr-FR')+' €';}}}}}});

</script>
</body>
</html>

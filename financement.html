<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — Répartition Financement</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — Répartition Financement</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">Total</div><div class="value" style="color:#1A2B4A">191 000 €</div></div>
<div class="metric"><div class="label">Fonds propres</div><div class="value" style="color:#185FA5">40 000 €</div></div>
<div class="metric"><div class="label">Prêt d'honneur</div><div class="value" style="color:#1D9E75">25 000 €</div></div>
<div class="metric"><div class="label">Emprunt bancaire</div><div class="value" style="color:#C49A3C">110 000 €</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">Structure du financement</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

new Chart(document.getElementById('c'),{type:'doughnut',data:{labels:["Apport associés 40 000 €","Prêt d'honneur 25 000 €","Subventions 16 000 €","Emprunt bancaire 110 000 €"],datasets:[{data:[40000,25000,16000,110000],backgroundColor:['#185FA5','#1D9E75','#C49A3C','#1A2B4A'],borderWidth:3,borderColor:'white',hoverOffset:12}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{font:{size:12},padding:16}},tooltip:{callbacks:{label:ctx=>{const pct=(ctx.parsed/191000*100).toFixed(1);return ctx.label+' — '+pct+'%';}}}}}});

</script>
</body>
</html>

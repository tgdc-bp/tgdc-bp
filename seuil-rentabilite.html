<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — Seuil de Rentabilité</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — Seuil de Rentabilité</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">Seuil de rentabilité</div><div class="value" style="color:#E24B4A">475 908 €</div></div>
<div class="metric"><div class="label">Point mort</div><div class="value" style="color:#C49A3C">Avr 2028</div></div>
<div class="metric"><div class="label">CA requis/mois</div><div class="value" style="color:#185FA5">39 659 €</div></div>
<div class="metric"><div class="label">Atteint en</div><div class="value" style="color:#1D9E75">Mois 19</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">Seuil de rentabilité vs CA</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

const months=['Sep 26','Oct','Nov','Déc','Jan 27','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep 27','Oct','Nov','Déc','Jan 28','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep 28','Oct','Nov','Déc','Jan 29','Fév','Mar','Avr','Mai','Jui','Jul','Aoû 29'];
function ramp(tot,n,s,e){const d=[];for(let i=0;i<n;i++){const t=i/(n-1);d.push(Math.round((tot/n)*(s+(e-s)*t)));}const diff=tot-d.reduce((a,b)=>a+b,0);d[d.length-1]+=diff;return d;}
const ca=[...ramp(370359,12,0.35,1.55),...ramp(793561,12,0.65,1.35),...ramp(1432081,12,0.70,1.30)];
let cum=0;const caCum=ca.map(v=>{cum+=v;return Math.round(cum);});
const seuilM=475908/12;let cs=0;const seuilCum=ca.map(()=>{cs+=seuilM;return Math.round(cs);});
new Chart(document.getElementById('c'),{type:'line',data:{labels:months,datasets:[{label:'CA cumulé HT (€)',data:caCum,borderColor:'#185FA5',borderWidth:2.5,pointRadius:2,backgroundColor:'rgba(24,95,165,0.08)',fill:false,tension:0.3},{label:'Seuil de rentabilité cumulé (€)',data:seuilCum,borderColor:'#E24B4A',borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false,tension:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toLocaleString('fr-FR')+' €'}}},scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>Math.round(v/1000)+'k€'},grid:{color:'rgba(200,200,200,0.3)'}}}}});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDC — CA par Activité</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f8f7f4; color: #1A2B4A; padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
             padding-bottom: 12px; border-bottom: 2px solid #C49A3C; }
  .logo { width: 44px; height: 44px; background: #1A2B4A; border-radius: 8px;
           display: flex; align-items: center; justify-content: center;
           font-size: 18px; color: #C49A3C; font-weight: bold; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #1A2B4A; }
  .header-text p  { font-size: 12px; color: #888; margin-top: 2px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .metric { background: white; border-radius: 10px; padding: 10px 14px;
             flex: 1; min-width: 120px; border: 1px solid #eee; }
  .metric .label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric .value { font-size: 18px; font-weight: 700; }
  .chart-wrap { background: white; border-radius: 12px; padding: 16px;
                 border: 1px solid #eee; position: relative; height: 340px; }
  .chart-title { font-size: 13px; color: #888; text-align: center;
                  margin-top: 12px; font-style: italic; }
  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">TG</div>
  <div class="header-text">
    <h1>The Gentlemen Drivers Club</h1>
    <p>Business Plan 2026 — CA par Activité</p>
  </div>
</div>
<div class="metrics"><div class="metric"><div class="label">CA A1</div><div class="value" style="color:#185FA5">370 k€</div></div>
<div class="metric"><div class="label">CA A2</div><div class="value" style="color:#185FA5">794 k€</div></div>
<div class="metric"><div class="label">CA A3</div><div class="value" style="color:#185FA5">1 432 k€</div></div>
<div class="metric"><div class="label">8 pôles actifs</div><div class="value" style="color:#1D9E75">dès sept. 2027</div></div>
</div>
<div class="chart-wrap">
  <canvas id="c"></canvas>
</div>
<p class="chart-title">CA par pôle d'activité A1→A3</p>
<div class="footer">The Gentlemen Drivers Club · Business Plan confidentiel · 2026</div>
<script>

const labs=['Bar & Restauration','Atelier Carrosserie','Négoce & Services','Cotisations Membres','Événements B2B','Rallyes','WE & Road Trips'];
const a1=[129313,119100,83000,9000,18709,9273,1964];
const a2=[284483,203000,150500,44000,48109,48000,15469];
const a3=[416663,348000,223500,89000,88139,225455,41324];
new Chart(document.getElementById('c'),{type:'bar',data:{labels:labs,datasets:[{label:'Année 1',data:a1,backgroundColor:'rgba(24,95,165,0.60)',borderRadius:3},{label:'Année 2',data:a2,backgroundColor:'rgba(24,95,165,0.80)',borderRadius:3},{label:'Année 3',data:a3,backgroundColor:'rgba(24,95,165,1.00)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toLocaleString('fr-FR')+' €'}}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>Math.round(v/1000)+'k€'},grid:{color:'rgba(200,200,200,0.3)'}}}}});

</script>
</body>
</html>
